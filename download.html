  function getParam(name){
    try{ return new URLSearchParams(location.search).get(name) || ""; }catch(e){ return ""; }
  }
  var ttclid = getParam("ttclid");
  var variant = (getParam("v") || "A").toUpperCase();

  // ======= Track (Netlify Forms) =======
  function postEvent(type){
    try{
      var data = {
        "form-name":"kw_event",
        "event_type": type,
        "ts": new Date().toISOString(),
        "page": location.pathname,
        "ref": document.referrer || "",
        "ua": navigator.userAgent || "",
        "ttclid": ttclid,
        "variant": variant
      };
      var body = new URLSearchParams(data).toString();
      if(navigator.sendBeacon){
        navigator.sendBeacon("/", new Blob([body], {type:"application/x-www-form-urlencoded"}));
        return;
      }
      fetch("/", { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body: body });
    }catch(e){}
  }

  function buildThankYou(){
    try{
      var u = new URL(THANKYOU_URL, location.href);
      if(ttclid) u.searchParams.set("ttclid", ttclid);
      if(variant) u.searchParams.set("v", variant);

  function openDownloadAndGoThankYou(downloadUrl){

    try{ w = window.open(downloadUrl, "_blank"); }catch(e){}

      window.location.href = downloadUrl;
      setTimeout(function(){ window.location.href = ty; }, 2000);
      return;
    }

    // Popup OK: go ThankYou immediately
    setTimeout(function(){ window.location.href = ty; }, 2000);
  }

  });
