<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ကျွဲဘုရင် — Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@500;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg0:#050509; --bg1:#0b0b12;
  --goldA:#ffe7a6; --goldB:#f7c75e;
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.70);
  --cardA: rgba(255,255,255,.08);
  --cardB: rgba(0,0,0,.55);
  --shadow: rgba(0,0,0,.65);
  --line: rgba(255,255,255,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Noto Sans Myanmar","Poppins",sans-serif;
  min-height:100vh;color:var(--text);
  background:
    radial-gradient(900px 520px at 50% -10%, rgba(247,199,94,.18), transparent 55%),
    radial-gradient(1200px 900px at 50% 120%, rgba(0,0,0,.95), transparent 55%),
    linear-gradient(180deg, var(--bg1), var(--bg0));
  display:flex;justify-content:center;
}
.wrap{width:100%;max-width:440px;padding:18px;}
.card{
  background:linear-gradient(180deg,var(--cardA),var(--cardB));
  border-radius:26px;
  padding:20px;
  text-align:center;
  box-shadow:0 24px 70px var(--shadow), 0 0 20px rgba(247,199,94,.15);
}
h1{
  font-size:22px;
  font-weight:900;
  margin:6px 0 10px;
  background:linear-gradient(90deg,#fff,var(--goldA),var(--goldB));
  -webkit-background-clip:text;
  color:transparent;
}
p{
  font-size:13px;
  line-height:1.7;
  color:var(--muted);
}
.divider{margin:14px 0;height:1px;background:var(--line);}

.imgbox{
  margin-top:10px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
}
.imgbox img{
  width:100%;
  display:block;
}

.support-title{
  font-weight:800;
  margin:14px 0 10px;
}
.row{display:flex;gap:10px;}
.pill{
  flex:1;
  text-decoration:none;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:white;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.tg svg{ fill:#229ED9; } .vb svg{ fill:#7360F2; }
svg{ width:18px;height:18px; }
.footer{
  margin-top:10px;
  font-size:12px;
  opacity:.5;
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">

  <!-- Netlify Forms tracking (hidden) -->
  <form name="kw_event" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="event_type" />
    <input name="ts" />
    <input name="page" />
    <input name="ref" />
    <input name="ua" />
    <input name="ttclid" />
    <input name="variant" />
  </form>

  <div class="card">
    <h1>ဒေါင်းလုတ် စတင်ပြီးပါပြီ ✅</h1>

    <!-- ✅ 2 lines only -->
    <p>ဖုန်းအပေါ်က Download notification ထဲမှာ “wave999.apk” ကိုစစ်ပေးပါနော်။</p>
    <p>Download ပြီးရင် ဖိုင်ကိုနှိပ်ပြီး Install လုပ်ပါ။</p>

    <div class="divider"></div>

    <!-- ✅ Account opening guide image -->
    <h2 style="font-size:16px;font-weight:900;margin-bottom:10px;">အကောင့်ဖွင့်နည်း</h2>

    <div class="imgbox">
      <!-- ✅ Replace this image filename with your screenshot file -->
      <img src="register-guide.jpg" alt="အကောင့်ဖွင့်နည်း ပုံ">
    </div>

    <div class="support-title">မရရင် ဒီနေရာကနေ ဆက်သွယ်ပါ</div>
    <div class="row">
      <a class="pill tg" href="https://tinyurl.com/wavebot9" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M9.04 15.44 8.8 19.14c.35 0 .5-.15.69-.33l1.66-1.59 3.44 2.52c.63.35 1.08.17 1.25-.58l2.27-10.65c.22-.97-.35-1.35-.96-1.13L3.23 9.53c-.92.36-.91.87-.17 1.1l3.45 1.08L15.6 6.6c.43-.26.82-.12.5.14L9.04 15.44z"/></svg>
        Telegram
      </a>
      <a class="pill vb" href="https://tinyurl.com/viberbotw9" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M20.52 3.48C18.84 1.8 15.98 1 12 1S5.16 1.8 3.48 3.48C1.8 5.16 1 8.02 1 12c0 4.3.92 6.77 2.79 8.5l-.63 3.12c-.08.4.29.77.69.69l3.12-.63C8.7 23.08 11.7 24 12 24c3.98 0 6.84-.8 8.52-2.48C22.2 19.84 23 16.98 23 13s-.8-6.84-2.48-8.52z"/></svg>
        Viber
      </a>
    </div>
  </div>

  <div class="footer">© မူရင်း ကျွဲစစ်စစ်</div>
</div>

<script>
(function(){
  function getParam(name){
    try{ return new URLSearchParams(location.search).get(name) || ""; }catch(e){ return ""; }
  }
  var ttclid = getParam("ttclid");
  var variant = (getParam("v") || "A").toUpperCase();

  function postEvent(type){
    try{
      var data = {
        "form-name":"kw_event",
        "event_type": type,
        "ts": new Date().toISOString(),
        "page": location.pathname,
        "ref": document.referrer || "",
        "ua": navigator.userAgent || "",
        "ttclid": ttclid,
        "variant": variant
      };
      var body = new URLSearchParams(data).toString();
      if(navigator.sendBeacon){
        navigator.sendBeacon("/", new Blob([body], {type:"application/x-www-form-urlencoded"}));
        return;
      }
      fetch("/", { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body: body });
    }catch(e){}
  }

  postEvent("view_thankyou");
})();
</script>

</body>
</html>
